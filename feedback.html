<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback — Disease Prediction System</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --navy:#0B1F3A;
  --teal:#0C8B7E;
  --bg:#F2F6FA;
  --white:#FFFFFF;
  --border:#D0DDE8;
  --text:#0F1F35;
}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  margin:0;
}

/* HEADER */
header {
  background:var(--navy);
  color:white;
  padding:18px 24px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

header h1 {
  font-family:'DM Serif Display',serif;
  font-size:1.2rem;
}

/* CARD */
.container {
  display:flex;
  justify-content:center;
  padding:40px 20px;
}

.card {
  background:var(--white);
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:450px;
  border:1px solid var(--border);
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

.card h2 {
  font-family:'DM Serif Display',serif;
  margin-bottom:20px;
}

/* INPUTS */
input, textarea {
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border:1.5px solid var(--border);
  border-radius:8px;
  font-family:'DM Sans';
}

input:focus, textarea:focus {
  border-color:var(--teal);
  outline:none;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  background:var(--teal);
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

button:hover {
  opacity:0.9;
}

/* BACK LINK */
.back {
  display:block;
  text-align:center;
  margin-top:15px;
  color:var(--teal);
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <h1>Disease Prediction System</h1>
</header>

<div class="container">
  <div class="card">
    <h2>Patient Feedback</h2>

    <form action="submit_feedback.php" method="POST">

      <label>Name</label>
      <input type="text" name="name" required>

      <label>Email</label>
      <input type="email" name="email" required>

      <label>Rating (1–5)</label>
      <input type="number" name="rating" min="1" max="5" required>

      <label>Your Feedback</label>
      <textarea name="message" rows="4" required></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

    <a href="index.html" class="back">← Back to App</a>
  </div>
</div>

</body>
</html>
